version: '3.8'

services:
  ros2_humble:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WORKSPACE: /workspace

    image: ros2_humble_dev
    container_name: ros2_humble_new

    # Port mapping per Foxglove
    ports:
      - "8765:8765"

    environment:
      ROS_DISTRO: humble
      TURTLEBOT3_MODEL: burger
      ROS_DOMAIN_ID: "0"
      WORKSPACE: /workspace

    volumes:
      - .:/workspace

    command:
      - ros2
      - launch
      - foxglove_bridge
      - foxglove_bridge_launch.xml
      - port:=8765
      - address:=0.0.0.0

    stdin_open: true
    tty: true