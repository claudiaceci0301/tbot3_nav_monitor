# config/params.yaml
# overrides the default or use the same default parameters

# Global
amcl:
  ros__parameters:
    use_sim_time: true

bt_navigator:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 20.0

    # Controllers
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 0.3
      max_vel_theta: 1.0
      min_vel_x: 0.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2

    controller_plugins: ["FollowPath"]

    # Goal checker plugin
    goal_checker_plugins: ["general_goal_checker"]

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25


planner_server:
  ros__parameters:
    use_sim_time: true

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5


behavior_server:
  ros__parameters:
    use_sim_time: true
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"


# costmap
local_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    rolling_window: true
    width: 3
    height: 3
    resolution: 0.05

    plugins: ["obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.5


global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    resolution: 0.05

    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.5


metric_collector_node:
  ros__parameters:
    use_sim_time: true
    publish_rate: 1.0
    battery_drain_rate: 0.01
    target_x: 0.85
    target_y: 0.70
    target_theta: 0.75
    distance_tolerance: 0.25
    obstacle_distance_tolerance: 0.15
    angle_tolerance: 0.4
    max_linear_vel: 0.3
    max_angular_vel: 1.0
    linear_gain: 0.5
    angular_gain: 2.0


adaptive_controller_node:
  ros__parameters:
    use_sim_time: true

    # Thresholds
    recovery_threshold: 3
    accuracy_threshold: 0.7
    efficiency_threshold: 0.75
    obstacle_threshold: 0.4
    window_size: 10

    # Normal (default) Nav2 values
    normal_max_vel_x: 0.3
    normal_max_vel_theta: 1.0
    normal_xy_goal_tolerance: 0.25
    normal_yaw_goal_tolerance: 0.25
    normal_inflation_radius: 0.5
    normal_gridbase_tolerance: 0.5
    normal_costmap_resolution: 0.05
    normal_costmap_width: 2
    normal_costmap_height: 2

    # Adaptive values
    reduced_max_vel_x: 0.15
    reduced_max_vel_theta: 0.5
    increased_xy_goal_tolerance: 0.35
    increased_yaw_goal_tolerance: 0.35
    increased_inflation_radius: 0.6
    reduced_gridbase_tolerance: 0.25
    increased_costmap_resolution: 0.1
    increased_costmap_width: 3
    increased_costmap_height: 3

data_logger_node:
  ros__parameters:
    use_sim_time: true
    enable_csv: true
    log_directory: "/workspace/logs"
    log_filename: "metric_collector_data"
    battery_alert_thresholds: [0.5, 0.85, 0.95]
    stagnant_count_alert_thresholds: 5
    odom_rate_alert_threshold: [5.0, 10.0]
    latency_ms_alert_threshold: [100.0, 500.0]
